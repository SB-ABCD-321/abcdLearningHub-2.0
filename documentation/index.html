<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Docs | ABCD Learning Hub</title>
<meta name="description" content="Access all ABCD Learning Hub study material. Sign in to unlock everything."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<!-- Clash Display fallback via Bunny CDN -->
<style>
@import url('https://fonts.bunny.net/css?family=clash-display:400,500,600,700');
</style>

<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
:root {
  /* Dark theme (default) */
  --bg:          #07090f;
  --bg2:         #0d1018;
  --glass:       rgba(255,255,255,.04);
  --glass-hover: rgba(255,255,255,.07);
  --glass-border:rgba(255,255,255,.08);
  --glass-border-hover: rgba(255,255,255,.16);
  --surface:     rgba(255,255,255,.05);
  --surface2:    rgba(255,255,255,.03);
  --ink:         #f0f2ff;
  --ink2:        #b8bdd8;
  --muted:       #6b7299;
  --muted2:      #3d4266;

  --a1: #4f7fff;
  --a2: #8b5cf6;
  --a3: #06d6a0;
  --a4: #ff6b6b;
  --a5: #ffd166;

  --glow1: rgba(79,127,255,.35);
  --glow2: rgba(139,92,246,.3);

  --font:      'Plus Jakarta Sans', 'Nunito', sans-serif;
  --font-head: 'Clash Display', 'Outfit', sans-serif;

  --r:    16px;
  --r-lg: 24px;
  --pill: 999px;

  --shadow-card: 0 4px 24px rgba(0,0,0,.4), 0 1px 4px rgba(0,0,0,.3);
  --shadow-glow: 0 0 60px rgba(79,127,255,.15), 0 8px 40px rgba(0,0,0,.5);
  --shadow-hover: 0 20px 60px rgba(0,0,0,.5), 0 0 40px var(--card-glow, rgba(79,127,255,.2));
}

[data-theme="light"] {
  --bg:          #f4f6ff;
  --bg2:         #eaedfa;
  --glass:       rgba(255,255,255,.72);
  --glass-hover: rgba(255,255,255,.9);
  --glass-border:rgba(100,120,220,.14);
  --glass-border-hover: rgba(79,127,255,.35);
  --surface:     rgba(255,255,255,.8);
  --surface2:    rgba(240,244,255,.7);
  --ink:         #0f1228;
  --ink2:        #2d3260;
  --muted:       #6870a8;
  --muted2:      #b0b8e0;
  --glow1: rgba(79,127,255,.2);
  --glow2: rgba(139,92,246,.15);
  --shadow-card: 0 4px 24px rgba(30,50,160,.08), 0 1px 4px rgba(30,50,160,.05);
  --shadow-hover: 0 20px 60px rgba(30,50,160,.15), 0 0 40px var(--card-glow, rgba(79,127,255,.12));
}

/* ═══════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .4s, color .4s;
}
a { color: inherit; text-decoration: none; }
button { font-family: var(--font); cursor: pointer; border: none; background: none; }

/* ═══════════════════════════════════════════════════
   CANVAS PARTICLE BACKGROUND
═══════════════════════════════════════════════════ */
#particle-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  opacity: .6;
}
[data-theme="light"] #particle-canvas { opacity: .3; }

/* ═══════════════════════════════════════════════════
   GRADIENT MESH
═══════════════════════════════════════════════════ */
.mesh {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.mesh-blob {
  position: absolute; border-radius: 50%;
  filter: blur(120px); animation: meshFloat 20s ease-in-out infinite;
}
.mb1 { width:700px;height:700px; background:radial-gradient(rgba(79,127,255,.22),transparent 65%); top:-200px;left:-150px; }
.mb2 { width:600px;height:600px; background:radial-gradient(rgba(139,92,246,.18),transparent 65%); bottom:-150px;right:-100px; animation-delay:-8s; }
.mb3 { width:400px;height:400px; background:radial-gradient(rgba(6,214,160,.12),transparent 65%); top:40%;left:50%; animation-delay:-14s; }
.mb4 { width:300px;height:300px; background:radial-gradient(rgba(255,107,107,.1),transparent 65%); top:20%;right:20%; animation-delay:-5s; }
[data-theme="light"] .mesh-blob { opacity: .55; }
@keyframes meshFloat {
  0%,100%  { transform: translate(0,0) scale(1); }
  33%      { transform: translate(40px,-50px) scale(1.08); }
  66%      { transform: translate(-30px,35px) scale(.94); }
}

/* ═══════════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════════ */
nav {
  position: sticky; top: 0; z-index: 500;
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  background: rgba(7,9,15,.75);
  border-bottom: 1px solid var(--glass-border);
  transition: background .4s;
}
[data-theme="light"] nav { background: rgba(244,246,255,.82); }

.nav-wrap {
  display: flex; align-items: center;
  max-width: 1320px; margin: 0 auto;
  padding: 0 28px; height: 64px;
  gap: 16px;
}

.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 1.1rem; color: var(--ink);
  flex-shrink: 0;
}
.nav-logo-mark {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--a1), var(--a2));
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  box-shadow: 0 0 20px var(--glow1), 0 3px 10px rgba(0,0,0,.3);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
}
.nav-logo:hover .nav-logo-mark {
  transform: rotate(-10deg) scale(1.12);
  box-shadow: 0 0 30px var(--glow1), 0 6px 18px rgba(0,0,0,.4);
}
.logo-accent { color: var(--a1); }

.nav-links { display: flex; align-items: center; gap: 2px; flex: 1; justify-content: center; }
.nav-link {
  font-size: .84rem; font-weight: 600; padding: 7px 14px;
  border-radius: 10px; color: var(--muted);
  transition: color .18s, background .18s;
  position: relative;
}
.nav-link::after {
  content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
  width: 0; height: 2px; border-radius: 2px;
  background: var(--a1);
  transition: width .2s;
}
.nav-link:hover { color: var(--ink); }
.nav-link:hover::after { width: 60%; }
.nav-link.active {
  color: #fff;
  background: linear-gradient(135deg, var(--a1), var(--a2));
  box-shadow: 0 0 20px var(--glow1);
}
.nav-link.active::after { display: none; }
[data-theme="light"] .nav-link.active { color: #fff; }

.nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Theme toggle */
.theme-toggle {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--glass); border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; cursor: pointer;
  transition: background .2s, border-color .2s, transform .2s;
}
.theme-toggle:hover { background: var(--glass-hover); border-color: var(--glass-border-hover); transform: scale(1.08); }

/* hamburger */
.ham { display: none; flex-direction: column; gap: 5px; padding: 9px; }
.ham span { display:block; width:20px; height:2px; background:var(--ink); border-radius:2px; transition:.25s; }
@media(max-width:720px) {
  .nav-links { display:none; position:absolute; top:64px; left:0; right:0;
    flex-direction:column; align-items:stretch; padding:12px 20px 16px; gap:4px;
    background:rgba(7,9,15,.96); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--glass-border); }
  [data-theme="light"] .nav-links { background:rgba(244,246,255,.97); }
  .nav-links.open { display:flex; }
  .nav-link { padding:12px 16px; }
  .ham { display:flex; }
}

/* ═══════════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════════ */
.hero {
  position: relative; z-index: 5;
  text-align: center;
  padding: 88px 24px 56px;
  max-width: 1320px; margin: 0 auto;
}

/* Floating pill badge */
.hero-pill {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 20px; border-radius: var(--pill);
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  font-size: .72rem; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--a1);
  margin-bottom: 28px;
  animation: heroFadeUp .6s ease both;
  box-shadow: 0 0 30px rgba(79,127,255,.12), inset 0 1px 0 rgba(255,255,255,.08);
}
.pill-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--a1); box-shadow: 0 0 8px var(--a1);
  animation: pillPulse 2s ease infinite;
}
@keyframes pillPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(.6);opacity:.4} }

/* Hero heading with gradient */
.hero-h1 {
  font-family: var(--font-head);
  font-size: clamp(2.4rem, 6vw, 4.2rem);
  font-weight: 700;
  line-height: 1.07;
  letter-spacing: -.5px;
  margin-bottom: 20px;
  animation: heroFadeUp .6s .1s ease both;
}
.h1-line1 { display: block; color: var(--ink); }
.h1-gradient {
  display: block;
  background: linear-gradient(90deg, var(--a1) 0%, var(--a2) 40%, var(--a3) 80%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200% auto;
  animation: heroFadeUp .6s .1s ease both, gradShift 4s ease-in-out infinite;
}
@keyframes gradShift { 0%,100%{background-position:0%} 50%{background-position:100%} }

.hero-sub {
  font-size: 1.05rem; color: var(--muted); max-width: 520px;
  margin: 0 auto 36px; line-height: 1.75; font-weight: 400;
  animation: heroFadeUp .6s .2s ease both;
}

/* ── User welcome chip ── */
.user-chip {
  display: none; align-items: center; gap: 12px;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px);
  border-radius: var(--pill); padding: 8px 20px 8px 8px;
  margin: 0 auto 32px; width: fit-content;
  box-shadow: 0 0 24px rgba(79,127,255,.12), 0 4px 16px rgba(0,0,0,.25);
  animation: heroFadeUp .4s ease both;
}
.user-chip.show { display: flex; }
.uc-img {
  width: 38px; height: 38px; border-radius: 50%; object-fit: cover;
  border: 2px solid rgba(79,127,255,.5);
  box-shadow: 0 0 12px rgba(79,127,255,.3);
}
.uc-fallback {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--a1), var(--a2));
  color: #fff; font-weight: 800; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 12px var(--glow1);
}
.uc-info { text-align: left; }
.uc-name { font-size: .88rem; font-weight: 700; color: var(--ink); }
.uc-email { font-size: .72rem; color: var(--muted); }
.uc-badge {
  font-size: .68rem; font-weight: 800; letter-spacing: .5px;
  text-transform: uppercase; padding: 3px 10px; border-radius: var(--pill);
  background: linear-gradient(90deg,var(--a3),rgba(6,214,160,.6));
  color: #fff; box-shadow: 0 0 10px rgba(6,214,160,.3);
}
.uc-out {
  font-size: .74rem; font-weight: 700; color: #ff6b6b; padding: 4px 12px;
  border-radius: var(--pill); border: 1px solid rgba(255,107,107,.25);
  background: rgba(255,107,107,.08); cursor: pointer;
  transition: background .18s, border-color .18s;
}
.uc-out:hover { background: rgba(255,107,107,.15); border-color: rgba(255,107,107,.5); }

/* ── Search ── */
.search-zone {
  display: flex; justify-content: center;
  animation: heroFadeUp .6s .3s ease both;
  margin-bottom: 56px;
}
.search-outer {
  position: relative; width: 100%; max-width: 520px;
}
.search-inner {
  display: flex; align-items: center; gap: 12px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  border-radius: var(--pill);
  padding: 14px 22px;
  box-shadow: 0 4px 30px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.06);
  transition: border-color .2s, box-shadow .2s;
}
.search-inner:focus-within {
  border-color: rgba(79,127,255,.5);
  box-shadow: 0 0 0 4px rgba(79,127,255,.12), 0 4px 30px rgba(0,0,0,.3);
}
.search-inner input {
  flex: 1; border: none; outline: none; background: none;
  font-family: var(--font); font-size: .95rem;
  color: var(--ink); font-weight: 500;
}
.search-inner input::placeholder { color: var(--muted); font-weight: 400; }
.s-icon { color: var(--muted); flex-shrink: 0; }
.s-kbd {
  font-size: .68rem; font-weight: 700; color: var(--muted);
  background: var(--surface2); border: 1px solid var(--glass-border);
  padding: 2px 8px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
}
.s-clear {
  color: var(--muted); cursor: pointer; font-size: .9rem;
  display: none; transition: color .15s; padding: 2px;
}
.s-clear:hover { color: var(--ink); }

/* Results count chip */
.results-count {
  position: absolute; right: 0; top: calc(100% + 8px);
  font-size: .73rem; font-weight: 700; color: var(--muted);
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(8px);
  padding: 4px 12px; border-radius: var(--pill);
  display: none;
}

/* ═══════════════════════════════════════════════════
   STATS ROW
═══════════════════════════════════════════════════ */
.stats-row {
  display: flex; justify-content: center; gap: 16px;
  max-width: 700px; margin: 0 auto 60px;
  flex-wrap: wrap;
  position: relative; z-index: 5;
  animation: heroFadeUp .6s .35s ease both;
}
.stat-chip {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 28px; border-radius: 18px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px);
  box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,.05);
  transition: transform .2s, border-color .2s, box-shadow .2s;
  min-width: 100px; flex: 1;
}
.stat-chip:hover { transform: translateY(-4px); border-color: var(--glass-border-hover); }
.stat-n {
  font-family: var(--font-head); font-size: 1.9rem; font-weight: 700;
  background: linear-gradient(135deg, var(--a1), var(--a2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1;
}
.stat-l { font-size: .7rem; font-weight: 700; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

/* ═══════════════════════════════════════════════════
   SECTION HDR
═══════════════════════════════════════════════════ */
.sec-hdr {
  display: flex; align-items: center; gap: 16px;
  max-width: 1320px; margin: 0 auto 28px;
  padding: 0 28px;
  position: relative; z-index: 5;
}
.sec-title {
  font-family: var(--font-head);
  font-size: .76rem; font-weight: 600;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--muted); white-space: nowrap;
}
.sec-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--glass-border), transparent); }

/* ═══════════════════════════════════════════════════
   DOC GRID
═══════════════════════════════════════════════════ */
.doc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 24px;
  max-width: 1320px; margin: 0 auto;
  padding: 0 28px 100px;
  position: relative; z-index: 5;
}

/* ═══════════════════════════════════════════════════
   CATEGORY CARD  — the star of the show
═══════════════════════════════════════════════════ */
.cat-card {
  position: relative;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
  box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,.06);
  transition:
    transform .3s cubic-bezier(.34,1.56,.64,1),
    box-shadow .3s ease,
    border-color .3s ease;
  animation: cardRise .5s ease both;
  cursor: default;
  /* Magnetic effect uses JS */
}
.cat-card:hover {
  transform: translateY(-8px) scale(1.01);
  box-shadow: var(--shadow-hover);
  border-color: var(--glass-border-hover);
}
[data-theme="light"] .cat-card {
  background: rgba(255,255,255,.75);
  box-shadow: 0 4px 24px rgba(30,50,160,.08), 0 1px 4px rgba(30,50,160,.04), inset 0 1px 0 rgba(255,255,255,.9);
}

/* Inner glow effect on card */
.cat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 180px;
  background: linear-gradient(180deg, var(--card-glow-color, rgba(79,127,255,.06)) 0%, transparent 100%);
  pointer-events: none;
  transition: opacity .3s;
  opacity: 0;
}
.cat-card:hover::before { opacity: 1; }

/* Shimmer sweep on hover */
.cat-card::after {
  content: '';
  position: absolute; top: -50%; left: -100%;
  width: 60%; height: 200%;
  background: linear-gradient(105deg, transparent, rgba(255,255,255,.04), transparent);
  transform: skewX(-15deg);
  transition: left .6s ease;
  pointer-events: none;
}
.cat-card:hover::after { left: 150%; }

/* Card header */
.card-head {
  padding: 24px 24px 0;
  display: flex; align-items: flex-start; gap: 16px;
}

/* Icon area */
.card-icon-wrap {
  position: relative; flex-shrink: 0;
  width: 56px; height: 56px;
}
.card-icon-bg {
  width: 56px; height: 56px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.cat-card:hover .card-icon-bg { transform: rotate(-8deg) scale(1.12); }
.card-icon-glow {
  position: absolute; inset: -4px;
  border-radius: 20px;
  opacity: 0; filter: blur(10px);
  transition: opacity .3s;
}
.cat-card:hover .card-icon-glow { opacity: .6; }

.card-meta { flex: 1; min-width: 0; }
.card-title {
  font-family: var(--font-head);
  font-size: 1.1rem; font-weight: 700;
  color: var(--ink); margin-bottom: 5px; line-height: 1.25;
}
.card-desc { font-size: .82rem; color: var(--muted); line-height: 1.6; }

/* Topic count badge */
.card-count {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 9px; padding: 4px 12px; border-radius: var(--pill);
  font-size: .7rem; font-weight: 800; letter-spacing: .5px; text-transform: uppercase;
  background: var(--badge-bg, rgba(79,127,255,.12));
  color: var(--badge-color, var(--a1));
  border: 1px solid var(--badge-border, rgba(79,127,255,.2));
}

/* Progress bar under header */
.card-progress {
  height: 3px; margin: 18px 24px 0;
  border-radius: 2px; overflow: hidden;
  background: rgba(255,255,255,.06);
}
.card-progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--c1, var(--a1)), var(--c2, var(--a2)));
  animation: progressGrow .8s ease both;
  box-shadow: 0 0 8px var(--c1, var(--a1));
}
@keyframes progressGrow { from{width:0} }

/* Separator */
.card-sep {
  height: 1px; margin: 16px 24px 0;
  background: linear-gradient(90deg, var(--glass-border) 0%, transparent 100%);
}

/* Doc list */
.doc-list { padding: 8px 0 16px; }

.doc-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 24px; position: relative;
  transition: background .15s; overflow: hidden;
}
/* Left accent bar */
.doc-item::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 0; border-radius: 0 3px 3px 0;
  background: var(--card-color, var(--a1));
  transition: height .2s ease;
}
.doc-item:hover { background: rgba(255,255,255,.03); }
.doc-item:hover::before { height: 65%; }
[data-theme="light"] .doc-item:hover { background: rgba(79,127,255,.04); }

/* Animated dot */
.di-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--card-color, var(--a1));
  opacity: .35;
  transition: opacity .18s, transform .18s, box-shadow .18s;
}
.doc-item:hover .di-dot {
  opacity: 1; transform: scale(1.5);
  box-shadow: 0 0 6px var(--card-color, var(--a1));
}

.di-title {
  flex: 1; font-size: .875rem; font-weight: 500;
  color: var(--ink2); line-height: 1.4;
  transition: color .18s;
}
.doc-item:hover .di-title { color: var(--ink); }

/* Badge */
.di-badge {
  font-size: .62rem; font-weight: 800; letter-spacing: .6px;
  text-transform: uppercase; padding: 2px 9px; border-radius: var(--pill);
  flex-shrink: 0;
}
.b-New     { background: rgba(6,214,160,.12); color: #06d6a0; border:1px solid rgba(6,214,160,.25); }
.b-Updated { background: rgba(255,209,102,.12); color: #ffd166; border:1px solid rgba(255,209,102,.25); }
.b-Hot     { background: rgba(255,107,107,.12); color: #ff6b6b; border:1px solid rgba(255,107,107,.25); }

/* Arrow */
.di-arrow {
  font-size: .78rem; color: var(--muted);
  opacity: 0; transform: translateX(-4px);
  transition: opacity .18s, transform .18s;
  flex-shrink: 0;
}
.doc-item:hover .di-arrow { opacity: 1; transform: translateX(0); }

/* Lock icon */
.di-lock { font-size: .85rem; opacity: .4; flex-shrink: 0; }

/* ═══════════════════════════════════════════════════
   NO RESULTS
═══════════════════════════════════════════════════ */
#no-results {
  display: none; text-align: center;
  padding: 80px 20px; color: var(--muted);
  position: relative; z-index: 5;
}
.nr-icon { font-size: 3.5rem; margin-bottom: 16px; display: block; }
#no-results h3 { font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; color: var(--ink2); margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════
   GATE OVERLAY (when not signed in)
═══════════════════════════════════════════════════ */
.page-gate {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  backdrop-filter: blur(20px) saturate(120%);
  -webkit-backdrop-filter: blur(20px) saturate(120%);
  background: rgba(7,9,15,.7);
  animation: gateIn .4s ease;
}
[data-theme="light"] .page-gate { background: rgba(244,246,255,.75); }
@keyframes gateIn { from{opacity:0} to{opacity:1} }

.gate-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border-radius: 28px; padding: 0;
  max-width: 440px; width: 100%;
  box-shadow: 0 24px 80px rgba(0,0,0,.5), 0 0 60px rgba(79,127,255,.15), inset 0 1px 0 rgba(255,255,255,.08);
  overflow: hidden;
  animation: gateCardIn .45s .05s cubic-bezier(.34,1.56,.64,1) both;
}
[data-theme="light"] .gate-card {
  background: rgba(255,255,255,.85);
  box-shadow: 0 24px 80px rgba(30,50,160,.18), inset 0 1px 0 rgba(255,255,255,.9);
}
@keyframes gateCardIn { from{opacity:0;transform:translateY(28px) scale(.95)} to{opacity:1;transform:none} }

.gate-top {
  height: 6px;
  background: linear-gradient(90deg, var(--a1), var(--a2), var(--a3));
  position: relative; overflow: hidden;
}
.gate-top::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  animation: gateShimmer 2s ease infinite;
}
@keyframes gateShimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

.gate-body { padding: 36px 36px 32px; text-align: center; }

.gate-icon-ring {
  width: 80px; height: 80px; margin: 0 auto 20px;
  border-radius: 24px;
  background: linear-gradient(135deg, var(--a1), var(--a2));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem;
  box-shadow: 0 0 40px rgba(79,127,255,.4), 0 8px 30px rgba(0,0,0,.3);
  position: relative;
  animation: iconFloat 3s ease-in-out infinite;
}
@keyframes iconFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.gate-icon-ring::after {
  content: '';
  position: absolute; inset: -6px; border-radius: 28px;
  border: 2px solid rgba(79,127,255,.25);
  animation: ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.08)} }

.gate-title {
  font-family: var(--font-head);
  font-size: 1.5rem; font-weight: 700;
  color: var(--ink); margin-bottom: 10px;
}
.gate-sub { font-size: .88rem; color: var(--muted); line-height: 1.65; margin-bottom: 24px; }

/* Perks */
.gate-perks { display: flex; flex-direction: column; gap: 8px; margin-bottom: 26px; text-align: left; }
.gate-perk {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 12px;
  background: var(--surface); border: 1px solid var(--glass-border);
  font-size: .83rem; font-weight: 600; color: var(--ink2);
  transition: border-color .18s, transform .18s;
}
.gate-perk:hover { border-color: var(--glass-border-hover); transform: translateX(4px); }
.perk-ic { font-size: 1.05rem; flex-shrink: 0; }
.perk-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--a3); flex-shrink: 0; box-shadow: 0 0 6px var(--a3); }

/* Main CTA button */
.gate-btn {
  width: 100%; padding: 15px; border-radius: 14px; border: none;
  font-family: var(--font); font-size: 1rem; font-weight: 800; color: #fff;
  background: linear-gradient(90deg, var(--a1), var(--a2));
  box-shadow: 0 4px 24px rgba(79,127,255,.4), 0 0 60px rgba(79,127,255,.15);
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform .2s, box-shadow .2s, opacity .2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.gate-btn::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
  transition: left .4s;
}
.gate-btn:hover::before { left: 100%; }
.gate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(79,127,255,.5); }
.gate-btn:active { transform: translateY(0); }

/* Auth provider chips */
.gate-providers {
  display: flex; gap: 10px; margin-top: 14px; justify-content: center;
}
.gate-provider {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 12px;
  background: var(--glass); border: 1px solid var(--glass-border);
  font-size: .82rem; font-weight: 700; color: var(--ink2);
  cursor: pointer;
  transition: background .18s, border-color .18s, transform .15s;
  flex: 1; justify-content: center;
}
.gate-provider:hover { background: var(--glass-hover); border-color: var(--glass-border-hover); transform: translateY(-2px); }

.gate-note { font-size: .73rem; color: var(--muted); margin-top: 16px; line-height: 1.5; }
.gate-note a { color: var(--a1); font-weight: 700; }
.gate-note a:hover { text-decoration: underline; }

/* ═══════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════ */
footer {
  position: relative; z-index: 5;
  border-top: 1px solid var(--glass-border);
  padding: 40px 28px;
  background: rgba(0,0,0,.2);
  backdrop-filter: blur(10px);
}
[data-theme="light"] footer { background: rgba(255,255,255,.3); }
.foot-wrap {
  max-width: 1320px; margin: 0 auto;
  display: flex; flex-direction: column; align-items: center;
  gap: 20px; text-align: center;
}
.foot-logo {
  font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; color: var(--ink);
  display: flex; align-items: center; gap: 9px;
}
.foot-logo-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--a1), var(--a2));
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem;
}
.foot-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 20px; }
.foot-link { font-size: .8rem; font-weight: 600; color: var(--muted); transition: color .15s; }
.foot-link:hover { color: var(--a1); }
.foot-copy { font-size: .73rem; color: var(--muted2); }

/* ═══════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════ */
@keyframes heroFadeUp  { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
@keyframes cardRise    { from{opacity:0;transform:translateY(24px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }

/* ═══════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════ */
@media(max-width:768px) {
  .hero { padding: 56px 20px 40px; }
  .doc-grid { grid-template-columns: 1fr; padding: 0 20px 60px; gap: 16px; }
  .stats-row { gap: 10px; margin-bottom: 44px; padding: 0 20px; }
  .stat-chip { padding: 14px 16px; min-width: 80px; }
  .sec-hdr { padding: 0 20px; }
  .gate-body { padding: 28px 24px 24px; }
  .gate-providers { flex-direction: column; }
}
@media(max-width:480px) {
  .hero-h1 { font-size: 2rem; }
  .nav-wrap { padding: 0 16px; }
  .gate-card { border-radius: 20px; }
}
</style>
</head>

      <div class="search-inner">

<!-- Configs -->

<script src="../auth.js"></script>

<script>
(() => {
  /* ── Config merge ─────────────────────────────────── */
  const S  = (typeof SITE_CONFIG !== 'undefined') ? SITE_CONFIG  : {};
  const DC = (typeof DOC_CONFIG  !== 'undefined') ? DOC_CONFIG   : { categories: [], navLinks: [] };
  const cats = DC.categories || [];

  const short = S.shortName || 'ABCD';
  const full  = S.name      || 'ABCD Learning Hub';
  document.getElementById('nav-short').textContent = short;

  /* ── Particles ─────────────────────────────────────── */
  (function initParticles() {
    const canvas = document.getElementById('particle-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, particles;
    const N = 70;

    function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    function mkParticle() {
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + .3,
        vx: (Math.random() - .5) * .25,
        vy: (Math.random() - .5) * .25,
        o: Math.random() * .5 + .1,
        color: ['#4f7fff','#8b5cf6','#06d6a0','#ffd166'][Math.floor(Math.random()*4)],
      };
    }
    particles = Array.from({length: N}, mkParticle);

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i+1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(79,127,255,${(1 - dist/120) * .12})`;
            ctx.lineWidth = .6;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      // Draw dots
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.color + Math.floor(p.o * 255).toString(16).padStart(2,'0');
        ctx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* ── Theme ─────────────────────────────────────────── */
  const html     = document.documentElement;
  const themeBtn = document.getElementById('theme-btn');
  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('abcd-theme', t);
  }
  const saved = localStorage.getItem('abcd-theme');
  applyTheme(saved || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));
  themeBtn.addEventListener('click', () =>
    applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

  /* ── Hamburger ──────────────────────────────────────── */
  const ham = document.getElementById('ham');
  const navLinks = document.getElementById('nav-links');
  ham.addEventListener('click', () => navLinks.classList.toggle('open'));
  document.addEventListener('click', e => { if (!ham.contains(e.target) && !navLinks.contains(e.target)) navLinks.classList.remove('open'); });

  /* ── Keyboard shortcut ⌘K / Ctrl+K for search ──────── */
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('search-input')?.focus();
    }
    if (e.key === 'Escape') document.getElementById('search-input')?.blur();
  });

  /* ── Stats ──────────────────────────────────────────── */
  const totalDocs = cats.reduce((s, c) => s + (c.docs||[]).length, 0);
  const statsEl = document.getElementById('stats-row');
  [
    { n: cats.length, l: 'Categories' },
    { n: totalDocs + '+', l: 'Documents' },
    { n: '100%', l: 'Free' },
    { n: '2019', l: 'Est.' },
  ].forEach(s => {
    statsEl.insertAdjacentHTML('beforeend',
      `<div class="stat-chip"><div class="stat-n">${s.n}</div><div class="stat-l">${s.l}</div></div>`);
  });

  /* ── Footer ─────────────────────────────────────────── */
  const navs = DC.navLinks || [];
  document.getElementById('foot-wrap').innerHTML = `
    <div class="foot-logo">
      
      <span><span style="color:var(--a1)">${short}</span> ${full.replace(short,'').trim() || 'Learning Hub'}</span>
    </div>
    <div class="foot-links">
      ${navs.map(l => `<a href="${l.href}" class="foot-link">${l.label}</a>`).join('')}
      ${(DC.footerExtras||[]).map(l => `<a href="${l.href}" class="foot-link">${l.label}</a>`).join('')}
    </div>
    <div class="foot-copy">
      © ${new Date().getFullYear()} ${full} · ${S.location||'West Bengal, India'}
      ${S.phone ? ' · ' + S.phone : ''}
    </div>`;

  /* ── Badge HTML ─────────────────────────────────────── */
  function badge(lbl) {
    if (!lbl) return '';
    return `<span class="di-badge b-${lbl}">${lbl}</span>`;
  }

  /* ── Render grid ────────────────────────────────────── */
  const grid  = document.getElementById('doc-grid');
  const noRes = document.getElementById('no-results');
  const resCount = document.getElementById('results-count');
  let authed = false;

  function renderGrid(q = '') {
    q = q.toLowerCase().trim();
    grid.innerHTML = '';
    let visible = 0, totalShown = 0;

    cats.forEach((cat, ci) => {
      const matched = (cat.docs||[]).filter(d =>
        !q ||
        d.title.toLowerCase().includes(q) ||
        cat.title.toLowerCase().includes(q) ||
        (cat.description||'').toLowerCase().includes(q)
      );
      if (q && matched.length === 0) return;
      visible++;

      const docs = q ? matched : (cat.docs || []);
      totalShown += docs.length;

      const [c1, c2] = cat.gradient || [cat.color||'#4f7fff', cat.color||'#8b5cf6'];
      const color = cat.color || '#4f7fff';
      const pct = Math.round((docs.length / Math.max(totalDocs, 1)) * 100 * 6);

      const card = document.createElement('div');
      card.className = 'cat-card';
      card.style.cssText = [
        `--c1:${c1}`, `--c2:${c2}`, `--card-color:${color}`,
        `--card-glow:${color}28`, `--card-glow-color:${color}0a`,
        `--badge-bg:${color}14`, `--badge-color:${color}`,
        `--badge-border:${color}25`,
        `animation-delay:${ci * 60}ms`,
      ].join(';');

      const docsHTML = docs.map(doc => {
        if (authed) {
          return `<a href="${cat.folder||''}${doc.file}" class="doc-item">
            <span class="di-dot"></span>
            <span class="di-title">${doc.title}</span>
            ${badge(doc.badge)}
            <span class="di-arrow">→</span>
          </a>`;
        } else {
          return `<div class="doc-item" style="cursor:default;opacity:.7">
            <span class="di-dot" style="opacity:.2"></span>
            <span class="di-title">${doc.title}</span>
            ${badge(doc.badge)}
            <span class="di-lock">🔒</span>
          </div>`;
        }
      }).join('');

      card.innerHTML = `
        <div class="card-head">
          <div class="card-icon-wrap">
            <div class="card-icon-bg" style="background:${color}18;border:1.5px solid ${color}25">
              ${cat.icon||'📄'}
            </div>
            <div class="card-icon-glow" style="background:${color}"></div>
          </div>
          <div class="card-meta">
            <div class="card-title">${cat.title}</div>
            <div class="card-desc">${cat.description||''}</div>
            <div class="card-count">
              <svg width="9" height="9" viewBox="0 0 12 12" fill="currentColor" opacity=".7">
                <path d="M9.5 2H8V1a.5.5 0 0 0-1 0v1H5V1a.5.5 0 0 0-1 0v1H2.5A.5.5 0 0 0 2 2.5v8a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 .5-.5v-8A.5.5 0 0 0 9.5 2Zm-.5 8h-6V5h6Z"/>
              </svg>
              ${docs.length} Topic${docs.length!==1?'s':''}
            </div>
          </div>
        </div>
        <div class="card-progress">
          <div class="card-progress-fill" style="width:${Math.min(pct, 100)}%"></div>
        </div>
        <div class="card-sep"></div>
        <div class="doc-list">${docsHTML}</div>`;

      grid.appendChild(card);
    });

    noRes.style.display = visible ? 'none' : 'block';

    // Results count for search
    if (q && visible > 0) {
      resCount.style.display = 'block';
      resCount.textContent = `${totalShown} result${totalShown!==1?'s':''} in ${visible} categor${visible!==1?'ies':'y'}`;
    } else {
      resCount.style.display = 'none';
    }
  }

  renderGrid();

  /* ── Search ─────────────────────────────────────────── */
  const searchIn = document.getElementById('search-input');
  const sClear   = document.getElementById('s-clear');
  searchIn?.addEventListener('input', () => {
    const v = searchIn.value;
    sClear.style.display = v ? 'block' : 'none';
    renderGrid(v);
  });
  sClear?.addEventListener('click', () => {
    searchIn.value = ''; sClear.style.display = 'none';
    searchIn.focus(); renderGrid();
  });

  /* ── After Clerk loads ──────────────────────────────── */
  document.addEventListener('clerk:ready', e => {
    const { user, userData: ud } = e.detail;
    if (!user || !ud) return;
    authed = true;

    // Reveal search bar
    document.querySelectorAll('.show-if-auth').forEach(el => el.style.display = '');

    // User welcome chip
    const chip = document.getElementById('user-chip');
    const avatarHTML = ud.avatar
      ? `<img src="${ud.avatar}" alt="${ud.fullName}" class="uc-img"/>`
      : `<div class="uc-fallback">${ud.initials}</div>`;

    chip.innerHTML = `
      ${avatarHTML}
      <div class="uc-info">
        <div class="uc-name">Hey, ${ud.firstName || ud.username || 'Student'}! 👋</div>
        <div class="uc-email">${ud.email}</div>
      </div>
      <span class="uc-badge">✓ Unlocked</span>
      <button class="uc-out sign-out-btn">Sign Out</button>`;
    chip.classList.add('show');

    renderGrid();
  });

  /* ── Override gate overlay to match new design ──────── */
  // auth.js creates the gate, but we override its styles via our CSS above.
  // If we need to intercept the gate button click for custom UI, do it here:
  document.addEventListener('clerk:ready', e => {
    if (e.detail.user) return; // skip if signed in
    // Re-enhance the gate button already created by auth.js
    const gateBtn = document.querySelector('.gate-btn');
    if (gateBtn) {
      // Replace simple gate with enhanced version (only if auth.js gate exists)
      const existingGate = document.querySelector('.page-gate');
      if (existingGate) enhanceGate(existingGate);
    }
  });

  function enhanceGate(existingGate) {
    // Add providers row to existing gate
    const gateNote = existingGate.querySelector('.gate-note');
    if (!gateNote) return;

    const providers = document.createElement('div');
    providers.className = 'gate-providers';
    providers.innerHTML = `
      <button class="gate-provider" id="gp-google">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>`;

    gateNote.parentNode.insertBefore(providers, gateNote);

    document.getElementById('gp-google')?.addEventListener('click', () => {
      window.Clerk?.openSignIn({ afterSignInUrl: window.location.href, afterSignUpUrl: window.location.href });
    });
  }

})();
</script>
</body>
</html>
