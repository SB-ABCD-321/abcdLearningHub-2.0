<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitCraft — Learn CS by Playing!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#00FF88;--b:#00BFFF;--o:#FF6B35;--p:#A855F7;--y:#FFE566;--r:#FF4466;--pk:#FF69B4;--cy:#00FFEE;--bg:#05080f}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Share Tech Mono',monospace;color:#fff;cursor:none}

/* ── CURSOR ── */
#cur{position:fixed;width:28px;height:28px;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}
#cur::before{content:'⛏️';font-size:20px;position:absolute;transform:rotate(-30deg);filter:drop-shadow(0 0 5px #FFE566);transition:transform .1s}
#cur.ck::before{transform:rotate(12deg) scale(1.4)}

/* ── LANG BUTTON ── */
#lang-btn{
  position:fixed;top:12px;right:16px;z-index:9999;
  display:flex;border:none;cursor:pointer;overflow:hidden;
  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
  box-shadow:0 0 18px rgba(255,229,102,.3);
}
.lb-half{
  padding:9px 13px;font-family:'Press Start 2P',monospace;font-size:9px;
  transition:all .2s;display:flex;align-items:center;gap:5px;
}
.lb-en{background:rgba(30,80,180,.9);color:#87CEEB}
.lb-bn{background:rgba(180,30,30,.9);color:#FF9999}
.lb-active-en .lb-en{background:#1a5cb0;color:#fff;box-shadow:inset 0 0 10px rgba(0,191,255,.3)}
.lb-active-bn .lb-bn{background:#b52020;color:#fff;box-shadow:inset 0 0 10px rgba(255,100,100,.3)}
#lang-btn:hover .lb-en,.lang-btn:hover .lb-bn{filter:brightness(1.2)}
.lb-dot{width:8px;height:8px;border-radius:50%;transition:all .2s}
.lb-active-en .lb-en .lb-dot{background:#00BFFF;box-shadow:0 0 8px #00BFFF}
.lb-active-en .lb-bn .lb-dot{background:#333}
.lb-active-bn .lb-bn .lb-dot{background:#FF6B35;box-shadow:0 0 8px #FF6B35}
.lb-active-bn .lb-en .lb-dot{background:#333}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.screen.active{display:flex}

/* ══ TITLE ══ */
#title-screen{background:var(--bg)}
#bgc{position:absolute;inset:0}
.tui{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;width:100%;max-width:500px}
.tbadge{font-family:'Orbitron',sans-serif;font-weight:900;font-size:9px;letter-spacing:5px;color:rgba(255,229,102,.5);animation:bfade 3s ease-in-out infinite}
@keyframes bfade{0%,100%{opacity:.5}50%{opacity:1}}
.tchar{font-size:clamp(40px,7vw,70px);animation:cbounce 1.5s ease-in-out infinite;filter:drop-shadow(0 0 15px #FFE56699)}
@keyframes cbounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
.tlogo{font-family:'Press Start 2P',monospace;font-size:clamp(28px,6vw,64px);line-height:1.2;text-align:center;
  background:linear-gradient(180deg,#FFF5A0,#FFD700 30%,#FF8C00 65%,#FF4500);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px rgba(255,165,0,.6));animation:lglow 2s ease-in-out infinite}
@keyframes lglow{0%,100%{filter:drop-shadow(0 0 40px rgba(255,165,0,.6))}50%{filter:drop-shadow(0 0 80px rgba(255,220,50,.9))}}
.ttag{font-size:clamp(10px,1.8vw,14px);color:var(--g);text-shadow:0 0 18px rgba(0,255,136,.5);text-align:center;letter-spacing:2px;animation:tshift 4s ease-in-out infinite}
.ttag-bn{font-family:'Hind Siliguri',sans-serif;font-size:clamp(12px,2vw,16px);font-weight:600}
@keyframes tshift{0%,100%{letter-spacing:2px}50%{letter-spacing:4px}}
.tbtns{display:flex;flex-direction:column;gap:9px;width:100%}
.tbtn{font-family:'Press Start 2P',monospace;font-size:10px;padding:14px 24px;border:none;cursor:pointer;
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);transition:transform .12s,filter .15s;
  position:relative;overflow:hidden;text-align:center}
.tbtn::before{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .4s}
.tbtn:hover{transform:scale(1.04) translateY(-2px);filter:brightness(1.2)}
.tbtn:hover::before{left:100%}
.tbtn:active{transform:scale(.97)}
.tbtn-bn{font-family:'Hind Siliguri',sans-serif!important;font-size:14px!important;font-weight:700!important}
.btn-play{background:linear-gradient(135deg,#0d5e0d,#1f9e1f);color:#fff;box-shadow:0 0 25px rgba(31,158,31,.4),0 5px 0 #063a06}
.btn-wld{background:linear-gradient(135deg,#0a3060,#1a5cb0);color:#fff;box-shadow:0 0 18px rgba(26,92,176,.35),0 5px 0 #041840}
.btn-how{background:linear-gradient(135deg,#4a2000,#8B4500);color:#FFD700;box-shadow:0 5px 0 #2a1000}
.tstrip{display:flex;gap:16px;align-items:center;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.05);padding:10px 18px}
.tss{text-align:center}.tsv{font-family:'Orbitron',sans-serif;font-weight:700;font-size:18px;color:var(--y)}
.tsl{font-size:8px;color:#444;margin-top:2px}
.tsl-bn{font-family:'Hind Siliguri',sans-serif;font-size:11px}
.pgnd{position:absolute;bottom:0;left:0;right:0;z-index:5}
.gr{height:20px;display:flex}
.gc{flex:1;transition:background .5s}

/* ══ WORLD SELECT ══ */
#ws{background:radial-gradient(ellipse at 30% 20%,rgba(0,100,255,.07),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(0,255,136,.04),transparent 50%),var(--bg);padding:20px;gap:18px;overflow-y:auto}
.wsh{display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;width:100%;max-width:960px}
.wst{font-family:'Press Start 2P',monospace;font-size:clamp(12px,2.2vw,20px);color:var(--y);text-shadow:0 0 30px rgba(255,229,102,.4)}
.wst-bn{font-family:'Hind Siliguri',sans-serif;font-weight:700;font-size:clamp(16px,2.8vw,26px)}
.wsub{font-size:11px;color:#444}
.wsub-bn{font-family:'Hind Siliguri',sans-serif;font-size:13px}
.wsbk{position:absolute;left:0;top:0;font-family:'Press Start 2P',monospace;font-size:8px;background:rgba(255,255,255,.04);color:#666;border:1px solid #2a2a2a;padding:7px 12px;cursor:pointer;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);transition:all .2s}
.wsbk:hover{color:#ccc;border-color:#666}
.wgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;width:100%;max-width:960px}
.wcard{background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid;padding:20px 16px;cursor:pointer;transition:transform .25s,box-shadow .25s,border-color .25s;position:relative;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px))}
.wcard::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;pointer-events:none}
.wcard:hover{transform:translateY(-5px) scale(1.02)}
.wcard:hover::before{opacity:1}
.wcicon{width:58px;height:58px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:36px;border:2px solid;clip-path:polygon(4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px),0 4px);background:rgba(0,0,0,.4);animation:ifl 3s ease-in-out infinite}
@keyframes ifl{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.wcnm{font-family:'Press Start 2P',monospace;font-size:7px;text-align:center;margin-bottom:5px;line-height:1.6}
.wcnm-bn{font-family:'Hind Siliguri',sans-serif;font-weight:700;font-size:12px;text-align:center;margin-bottom:5px}
.wcsb{font-size:11px;color:#999;text-align:center;line-height:1.5}
.wcsb-bn{font-family:'Hind Siliguri',sans-serif;font-size:12px}
.wctg{font-family:'Orbitron',sans-serif;font-weight:700;font-size:7px;text-align:center;margin-top:8px;letter-spacing:2px}
.wctg-bn{font-family:'Hind Siliguri',sans-serif;font-size:10px;letter-spacing:0;font-weight:700}
.wcst{text-align:center;font-size:16px;margin-top:6px;letter-spacing:3px}
.wcpb{margin-top:8px;height:3px;background:rgba(255,255,255,.04);overflow:hidden}
.wcpbf{height:100%;width:0;transition:width 1s}
.wclvl{font-size:9px;color:#333;text-align:center;margin-top:5px;font-family:'Press Start 2P',monospace}
.wclvl-bn{font-family:'Hind Siliguri',sans-serif;font-size:11px}
/* world colours */
.wc-bi{border-color:rgba(0,255,136,.25);--wc:#00FF88}.wc-bi::before{background:radial-gradient(circle at 50% 0%,rgba(0,255,136,.1),transparent)}.wc-bi:hover{border-color:rgba(0,255,136,.6);box-shadow:0 0 35px rgba(0,255,136,.15)}.wc-bi .wcicon{border-color:rgba(0,255,136,.35)}.wc-bi .wcnm,.wc-bi .wcnm-bn,.wc-bi .wctg,.wc-bi .wctg-bn{color:#00FF88}.wc-bi .wcpbf{background:#00FF88;box-shadow:0 0 6px #00FF88}
.wc-hw{border-color:rgba(255,107,53,.25);--wc:#FF6B35}.wc-hw::before{background:radial-gradient(circle at 50% 0%,rgba(255,107,53,.1),transparent)}.wc-hw:hover{border-color:rgba(255,107,53,.6);box-shadow:0 0 35px rgba(255,107,53,.15)}.wc-hw .wcicon{border-color:rgba(255,107,53,.35)}.wc-hw .wcnm,.wc-hw .wcnm-bn,.wc-hw .wctg,.wc-hw .wctg-bn{color:#FF6B35}.wc-hw .wcpbf{background:#FF6B35;box-shadow:0 0 6px #FF6B35}
.wc-cd{border-color:rgba(168,85,247,.25);--wc:#A855F7}.wc-cd::before{background:radial-gradient(circle at 50% 0%,rgba(168,85,247,.1),transparent)}.wc-cd:hover{border-color:rgba(168,85,247,.6);box-shadow:0 0 35px rgba(168,85,247,.15)}.wc-cd .wcicon{border-color:rgba(168,85,247,.35)}.wc-cd .wcnm,.wc-cd .wcnm-bn,.wc-cd .wctg,.wc-cd .wctg-bn{color:#A855F7}.wc-cd .wcpbf{background:#A855F7;box-shadow:0 0 6px #A855F7}
.wc-nt{border-color:rgba(0,191,255,.25);--wc:#00BFFF}.wc-nt::before{background:radial-gradient(circle at 50% 0%,rgba(0,191,255,.1),transparent)}.wc-nt:hover{border-color:rgba(0,191,255,.6);box-shadow:0 0 35px rgba(0,191,255,.15)}.wc-nt .wcicon{border-color:rgba(0,191,255,.35)}.wc-nt .wcnm,.wc-nt .wcnm-bn,.wc-nt .wctg,.wc-nt .wctg-bn{color:#00BFFF}.wc-nt .wcpbf{background:#00BFFF;box-shadow:0 0 6px #00BFFF}
.wc-px{border-color:rgba(255,105,180,.25);--wc:#FF69B4}.wc-px::before{background:radial-gradient(circle at 50% 0%,rgba(255,105,180,.1),transparent)}.wc-px:hover{border-color:rgba(255,105,180,.6);box-shadow:0 0 35px rgba(255,105,180,.15)}.wc-px .wcicon{border-color:rgba(255,105,180,.35)}.wc-px .wcnm,.wc-px .wcnm-bn,.wc-px .wctg,.wc-px .wctg-bn{color:#FF69B4}.wc-px .wcpbf{background:#FF69B4;box-shadow:0 0 6px #FF69B4}
.wc-sc{border-color:rgba(0,255,238,.25);--wc:#00FFEE}.wc-sc::before{background:radial-gradient(circle at 50% 0%,rgba(0,255,238,.1),transparent)}.wc-sc:hover{border-color:rgba(0,255,238,.6);box-shadow:0 0 35px rgba(0,255,238,.15)}.wc-sc .wcicon{border-color:rgba(0,255,238,.35)}.wc-sc .wcnm,.wc-sc .wcnm-bn,.wc-sc .wctg,.wc-sc .wctg-bn{color:#00FFEE}.wc-sc .wcpbf{background:#00FFEE;box-shadow:0 0 6px #00FFEE}

/* ══ HUD ══ */
#gs{background:var(--bg);padding:0}
#bgs{position:absolute;inset:0;z-index:0}
.hud{position:relative;z-index:20;width:100%;background:rgba(5,8,15,.95);border-bottom:1px solid rgba(255,255,255,.06);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(18px);flex-shrink:0}
.hudl{display:flex;align-items:center;gap:10px}
.hudbk{font-family:'Press Start 2P',monospace;font-size:7px;background:transparent;color:#444;border:1px solid #222;padding:6px 11px;cursor:pointer;clip-path:polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);transition:all .2s}
.hudbk:hover{color:#ccc;border-color:#555}
.hudwn{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--y);text-shadow:0 0 12px rgba(255,229,102,.35)}
.hudwn-bn{font-family:'Hind Siliguri',sans-serif;font-weight:700;font-size:13px;color:var(--y)}
.hudc{display:flex;align-items:center;gap:6px}
.pd{width:11px;height:11px;background:#111;border:1px solid #2a2a2a;transition:all .35s;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}
.pd.done{background:#FFE566;border-color:#FFE566;box-shadow:0 0 7px #FFE566}
.pd.act{background:#FF8C00;border-color:#FF8C00;animation:dpa 1s ease-in-out infinite}
@keyframes dpa{0%,100%{box-shadow:0 0 5px #FF8C00}50%{box-shadow:0 0 18px #FF8C00}}
.hudr{display:flex;align-items:center;gap:14px}
.hudlv{display:flex;gap:3px}
.hrt{font-size:19px;transition:all .3s}.hrt.lost{filter:grayscale(1);transform:scale(.65);opacity:.4}
.hrt.shk{animation:hshk .4s}
@keyframes hshk{0%,100%{transform:scale(1)}25%{transform:scale(1.5) rotate(-12deg)}75%{transform:scale(.8) rotate(10deg)}}
.hudsc{font-family:'Orbitron',sans-serif;font-weight:900;font-size:17px;color:var(--y);text-shadow:0 0 12px rgba(255,229,102,.4);transition:transform .2s}
.hudsc.pop{animation:sp .3s}
@keyframes sp{0%{transform:scale(1)}50%{transform:scale(1.45)}100%{transform:scale(1)}}
.hudsl{font-size:7px;color:#333;font-family:'Press Start 2P',monospace}
.hudsl-bn{font-family:'Hind Siliguri',sans-serif;font-size:10px}
.gc-area{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:10;padding:14px}
/* CARD */
.cc{background:rgba(5,9,18,.97);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(25px);max-width:880px;width:100%;max-height:calc(100vh - 86px);overflow-y:auto;position:relative;clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));animation:capp .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes capp{from{transform:scale(.78) translateY(55px);opacity:0}to{transform:scale(1);opacity:1}}
.cst{height:3px;position:sticky;top:0;z-index:5}
.cs-bi{background:linear-gradient(90deg,transparent,#00FF88,#00BBFF,#00FF88,transparent)}
.cs-hw{background:linear-gradient(90deg,transparent,#FF6B35,#FFD700,#FF6B35,transparent)}
.cs-cd{background:linear-gradient(90deg,transparent,#A855F7,#EC4899,#A855F7,transparent)}
.cs-nt{background:linear-gradient(90deg,transparent,#00BFFF,#0080FF,#00BFFF,transparent)}
.cs-px{background:linear-gradient(90deg,transparent,#FF69B4,#FFB6C1,#FF69B4,transparent)}
.cs-sc{background:linear-gradient(90deg,transparent,#00FFEE,#00BFFF,#00FFEE,transparent)}

/* ── SHARED GAME STYLES ── */
.gp{padding:22px}
.gt{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.4vw,12px);margin-bottom:5px}
.gt-bn{font-family:'Hind Siliguri',sans-serif;font-weight:700;font-size:clamp(13px,2vw,19px);margin-bottom:5px}
.gs2{font-size:13px;color:#aaa;margin-bottom:14px;line-height:1.7}
.gs2-bn{font-family:'Hind Siliguri',sans-serif;font-size:15px;line-height:1.8}
.tbx{padding:12px 15px;margin-bottom:16px;border-left:4px solid;background:rgba(255,255,255,.025);font-size:13px;color:#ccc;line-height:1.7}
.tbx-bn{font-family:'Hind Siliguri',sans-serif;font-size:15px}
/* Buttons */
.gb{font-family:'Press Start 2P',monospace;font-size:8px;padding:11px 18px;border:none;cursor:pointer;clip-path:polygon(7px 0,100% 0,calc(100% - 7px) 100%,0 100%);transition:filter .2s,transform .1s;position:relative;overflow:hidden}
.gb::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.13),transparent 50%);pointer-events:none}
.gb:hover{filter:brightness(1.3);transform:translateY(-2px)}.gb:active{transform:scale(.97)}
.gb-bn{font-family:'Hind Siliguri',sans-serif!important;font-size:12px!important;font-weight:700!important}
.gb-g{background:linear-gradient(135deg,#0d5e0d,#1f9e1f);color:#fff;box-shadow:0 4px 0 #063a06,0 0 18px rgba(31,158,31,.25)}
.gb-r{background:linear-gradient(135deg,#6e0d0d,#b52020);color:#fff;box-shadow:0 4px 0 #3a0606}
.gb-b{background:linear-gradient(135deg,#0a3060,#1a5cb0);color:#fff;box-shadow:0 4px 0 #041840}
.gb-gd{background:linear-gradient(135deg,#5a3d00,#a87200);color:#FFE566;box-shadow:0 4px 0 #2a1d00}
.gb-pu{background:linear-gradient(135deg,#3a1060,#7c3aed);color:#fff;box-shadow:0 4px 0 #1a0830}
.gb-cy{background:linear-gradient(135deg,#003a3a,#00a0a0);color:#00FFEE;box-shadow:0 4px 0 #001818}

/* ══ BINARY GAME ══ */
.bitrow{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:18px 0}
.bcol{display:flex;flex-direction:column;align-items:center;gap:7px}
.bpow{font-family:'Orbitron',sans-serif;font-weight:700;font-size:10px;color:#444;transition:color .2s}
.bpow.on{color:var(--g)}
.bbtn{width:62px;height:62px;border:2px solid #222;font-family:'Press Start 2P',monospace;font-size:21px;background:#080808;color:#222;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;clip-path:polygon(5px 0,calc(100% - 5px) 0,100% 5px,100% calc(100% - 5px),calc(100% - 5px) 100%,5px 100%,0 calc(100% - 5px),0 5px);position:relative;overflow:hidden}
.bbtn::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(0,255,136,.25),transparent);opacity:0;transition:opacity .2s}
.bbtn:hover{border-color:#333;background:#0e0e0e}
.bbtn.on{background:rgba(0,255,136,.08);border-color:var(--g);color:var(--g);box-shadow:0 0 22px rgba(0,255,136,.35),inset 0 0 10px rgba(0,255,136,.08)}
.bbtn.on::after{opacity:1}
.bval{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#2a2a2a;transition:all .2s}
.bval.on{color:var(--g);text-shadow:0 0 8px rgba(0,255,136,.45)}
.bscore{display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.05);padding:14px;margin-bottom:14px}
.bsc-col{text-align:center}.bsc-lbl{font-size:8px;color:#333;margin-bottom:5px;font-family:'Press Start 2P',monospace}
.bsc-lbl-bn{font-family:'Hind Siliguri',sans-serif;font-size:11px}
.bsc-val{font-family:'Orbitron',sans-serif;font-weight:900;font-size:26px;transition:all .3s}
.bsc-val.match{color:var(--g);text-shadow:0 0 18px rgba(0,255,136,.7);animation:mp .4s}
.bsc-val.nom{color:var(--r)}
.bsc-eq{font-family:'Orbitron',sans-serif;font-size:26px;color:#222;transition:color .3s}
.bsc-eq.match{color:var(--g)}
@keyframes mp{0%{transform:scale(1.5)}100%{transform:scale(1)}}

/* ══ GATE GAME ══ */
.garena{background:rgba(0,0,0,.45);border:1px solid rgba(255,107,53,.12);padding:22px;margin:14px 0;display:flex;flex-direction:column;align-items:center;gap:18px}
.gvis{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.ginput-stack{display:flex;flex-direction:column;gap:12px}
.git{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.gitbtn{width:68px;height:68px;border:2px solid #222;font-family:'Press Start 2P',monospace;font-size:23px;background:#070707;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;clip-path:polygon(5px 0,calc(100% - 5px) 0,100% 5px,100% calc(100% - 5px),calc(100% - 5px) 100%,5px 100%,0 calc(100% - 5px),0 5px)}
.gitbtn.on{background:rgba(0,255,136,.07);border-color:var(--g);color:var(--g);box-shadow:0 0 22px rgba(0,255,136,.25)}
.gitbtn.off{color:var(--r);border-color:rgba(255,68,102,.35);background:rgba(255,68,102,.04)}

function applyLang(){
  const ibn=L==='bn';
  const btn=document.getElementById('lang-btn');
  btn.className=ibn?'lb-active-bn':'lb-active-en';
  document.querySelectorAll('[data-en]').forEach(el=>{
    el.textContent=el.dataset[L]||el.dataset.en;
  });
  // tagline font
  const tt=document.getElementById('ttag');
  if(tt){tt.className=ibn?'ttag ttag-bn':'ttag';tt.textContent=tt.dataset[L];}
  // title buttons
  document.querySelectorAll('.tbtn').forEach(b=>{
    b.className=b.className.replace(' tbtn-bn','');
    if(ibn) b.className+=' tbtn-bn';
    if(b.dataset[L]) b.textContent=b.dataset[L];
  });
  document.querySelectorAll('.gb').forEach(b=>{
    b.className=b.className.replace(' gb-bn','');
    if(ibn) b.className+=' gb-bn';
    if(b.dataset[L]) b.textContent=b.dataset[L];
  });
  if(GS.world){
    const wn=document.getElementById('hudwn');
    wn.textContent=WD[GS.world].name[L];
    wn.className=ibn?'hudwn-bn':'hudwn';
  }
}

(function bgTitle(){
  const c=document.getElementById('bgc'),ctx=c.getContext('2d');
  const P=['0','1','#','if','for','AND','OR','CPU','RAM','IP','Hz','bit','byte','def','int','++'];
  const CLRS=['#00FF8828','#FF6B3528','#A855F728','#00BFFF28','#FFE56628','#FF446628'];
  let W,H; const items=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();
  for(let i=0;i<65;i++) items.push({x:Math.random()*1400,y:Math.random()*900,
    vy:.3+Math.random()*.7,t:P[~~(Math.random()*P.length)],c:CLRS[~~(Math.random()*CLRS.length)],
    s:10+Math.random()*9,a:.1+Math.random()*.2});
  (function draw(){
    ctx.fillStyle='rgba(5,8,15,.16)';ctx.fillRect(0,0,W,H);
    items.forEach(it=>{
      ctx.save();ctx.globalAlpha=it.a;ctx.font=`bold ${it.s}px 'Share Tech Mono',monospace`;
      ctx.fillStyle=it.c;ctx.fillText(it.t,it.x,it.y);ctx.restore();
      it.y+=it.vy;if(it.y>H+20){it.y=-20;it.x=Math.random()*W;it.t=P[~~(Math.random()*P.length)];}
    });
    requestAnimationFrame(draw);
  })();
  window.addEventListener('resize',resize);
})();

// pixel ground
(function mkGround(){
  const g=document.getElementById('pgnd');
  const GRS=['#2d5e18','#3a7a22','#4a9a2c'],DRT=['#5a3010','#6b3a1a','#7a4a24'];
  const n=Math.ceil(window.innerWidth/20)+2;
  ['r1','r2','r3'].forEach((id,ri)=>{
    const r=document.createElement('div');r.className='gr';
    for(let i=0;i<n;i++){
      const d=document.createElement('div');d.className='gc';
      d.style.background=ri===0?GRS[i%GRS.length]:DRT[i%DRT.length];r.appendChild(d);
    }
    g.appendChild(r);
  });
})();

let scRaf=null;
function startScene(wid){
  if(scRaf) cancelAnimationFrame(scRaf);
  const c=document.getElementById('bgs');c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  const TH={bi:{sky:'#040f06',acc:'#00FF88'},hw:{sky:'#0f0600',acc:'#FF6B35'},
    cd:{sky:'#060410',acc:'#A855F7'},nt:{sky:'#00040f',acc:'#00BFFF'},
    px:{sky:'#0f0408',acc:'#FF69B4'},sc:{sky:'#000f0e',acc:'#00FFEE'}}[wid]||{sky:'#040f06',acc:'#00FF88'};
  const pts=[];
  for(let i=0;i<28;i++) pts.push({x:Math.random()*W,y:Math.random()*H*.7,
    vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,s:1+Math.random()*3,a:.05+Math.random()*.18});
  (function draw(){
    ctx.fillStyle=TH.sky+'bb';ctx.fillRect(0,0,W,H);
    for(let x=0;x<W;x+=42){ctx.fillStyle=TH.acc+'18';ctx.fillRect(x,H-65,40,65);ctx.fillStyle=TH.acc+'08';ctx.fillRect(x,H-65,40,4);}
    pts.forEach(p=>{
      ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=TH.acc;ctx.fillRect(p.x,p.y,p.s,p.s);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H*.7;if(p.y>H*.7)p.y=0;
    });
    scRaf=requestAnimationFrame(draw);
  })();
}

  sc:{id:'sc',name:{en:'🔢 SORT VALLEY',bn:'🔢 সর্ট ভ্যালি'},
    sub:{en:'Sort arrays using Bubble Sort — step by step!',bn:'বাবল সর্ট দিয়ে অ্যারে সাজাও — ধাপে ধাপে!'},
    icon:'🔢',cc:'wc-sc',color:'#00FFEE',
    tag:{en:'SORTING ALGORITHMS',bn:'সর্টিং অ্যালগরিদম'},type:'sort',
    fact:{en:"Bubble Sort is one of the first algorithms students learn! It compares pairs of numbers and swaps them if they're in the wrong order. Real computers use faster sorts like QuickSort (invented 1959) and MergeSort. Google processes 8.5 billion searches daily — each needs sorting!",
      bn:"বাবল সর্ট হলো প্রথম অ্যালগরিদমগুলির একটি যা শিক্ষার্থীরা শেখে! এটি সংখ্যার জোড়া তুলনা করে এবং ভুল ক্রমে থাকলে বদলায়। আসল কম্পিউটার দ্রুত সর্ট ব্যবহার করে যেমন QuickSort (১৯৫৯ সালে আবিষ্কৃত) এবং MergeSort। Google প্রতিদিন ৮৫০ কোটি অনুসন্ধান প্রক্রিয়া করে — প্রতিটিতে সর্টিং দরকার!"},
    levels:[
      {arr:[3,1,2],story:{en:"3 numbers out of order! Compare neighbors and swap if wrong. Sort them smallest to largest!",bn:"৩টি সংখ্যা এলোমেলো! প্রতিবেশী তুলনা করো এবং ভুল হলে বদলাও। ছোট থেকে বড় সাজাও!"},task:{en:"Click SWAP to swap highlighted pairs, or SKIP if already in order.",bn:"হাইলাইট করা জোড়া বদলাতে SWAP ক্লিক করো, বা ইতিমধ্যে ক্রমানুসারে থাকলে SKIP।"}},
      {arr:[4,2,5,1],story:{en:"4 numbers! Bubble Sort compares adjacent pairs. Larger numbers bubble to the right.",bn:"৪টি সংখ্যা! বাবল সর্ট পার্শ্ববর্তী জোড়া তুলনা করে। বড় সংখ্যা ডানে ভেসে যায়।"},task:{en:"Go through each pair — swap if left > right. Keep going until sorted!",bn:"প্রতিটি জোড়া দেখো — বাঁ দিক > ডানে হলে বদলাও। সম্পূর্ণ সাজানো না হওয়া পর্যন্ত চালিয়ে যাও!"}},

function startWorld(wid){
  GS.world=wid;GS.level=0;GS.lives=3;GS.score=0;GS.perfect=0;GS.startTime=Date.now();
  const w=WD[wid];
  const wn=document.getElementById('hudwn');
  wn.textContent=w.name[L];wn.className=L==='bn'?'hudwn-bn':'hudwn';
  startScene(wid);showScreen('gs');
  renderHUD();loadLevel();
}

function renderHUD(){
  const hd=document.getElementById('hudlv');hd.innerHTML='';
  for(let i=0;i<3;i++){const h=document.createElement('span');h.className='hrt'+(i>=GS.lives?' lost':'');h.textContent='❤️';hd.appendChild(h);}
  const sc=document.getElementById('hudsc');sc.textContent=GS.score;sc.classList.add('pop');setTimeout(()=>sc.classList.remove('pop'),300);
  const w=WD[GS.world];
  const lvls=w.type==='code'?w.getLevels():(w.levels||w.getLevels?.());
  const nl=Array.isArray(lvls)?lvls.length:(typeof lvls==='number'?lvls:5);
  const pd=document.getElementById('pdots');pd.innerHTML='';
  for(let i=0;i<nl;i++){const d=document.createElement('div');d.className='pd'+(i<GS.level?' done':i===GS.level?' act':'');pd.appendChild(d);}
}

// ═══════════════════════════════════════
// LOAD LEVEL
// ═══════════════════════════════════════
function loadLevel(){
  const c=document.getElementById('cc');c.style.animation='none';void c.offsetWidth;c.style.animation='';
  document.getElementById('cst').className='cst cs-'+GS.world;
  renderHUD();
  const w=WD[GS.world];
  if(w.type==='binary') buildBinary();
  else if(w.type==='hardware') buildHardware();
  else if(w.type==='code') buildCode();
  else if(w.type==='memory') buildMemory();
  else if(w.type==='pixel') buildPixel();
  else if(w.type==='sort') buildSort();
}

// ═══════════════════════════════════════
// ── BINARY GAME ──
// ═══════════════════════════════════════
let BB=[0,0,0,0];
function buildBinary(){
  BB=[0,0,0,0];
  const lvl=WD.bi.levels[GS.level];
  const b=document.getElementById('cbody');
  b.innerHTML=`<div class="gp">
    <div class="${L==='bn'?'gt-bn':'gt'}" style="color:var(--g)">🌿 ${WD.bi.name[L]}</div>
    <div class="${L==='bn'?'gs2-bn':'gs2'}">${lvl.story[L]}</div>
    <div class="tbx ${L==='bn'?'tbx-bn':''}" style="border-color:var(--g)">
      <strong style="color:var(--g)">${t('mission')}</strong> ${lvl.task[L]}</div>
    <div class="bitrow" id="bitrow"></div>
    <div class="bscore">
      <div class="bsc-col"><div class="${L==='bn'?'bsc-lbl-bn':'bsc-lbl'}">${t('yourval')}</div><div class="bsc-val nom" id="bcur">0</div></div>
      <div class="bsc-eq" id="beq">≠</div>
      <div class="bsc-col"><div class="${L==='bn'?'bsc-lbl-bn':'bsc-lbl'}">${t('target')}</div><div class="bsc-val" style="color:var(--y)">${lvl.target}</div></div>
    </div>
    <div style="display:flex;gap:9px;align-items:center;flex-wrap:wrap">
      <button class="gb gb-r ${L==='bn'?'gb-bn':''}" onclick="resetBits()">${t('reset')}</button>
      <div style="font-size:${L==='bn'?'13px':'10px'};color:#2a2a2a;font-family:${L==='bn'?'Hind Siliguri':'Share Tech Mono'},sans-serif;padding:8px">
        ${L==='en'?'💡 Click the squares to flip bits!':'💡 বর্গ ক্লিক করে বিট বদলাও!'}</div>
    </div></div>`;
  renderBits();
}
function renderBits(){
  const row=document.getElementById('bitrow');if(!row)return;row.innerHTML='';
  [8,4,2,1].forEach((p,i)=>{
    const on=BB[i]===1;
    const col=document.createElement('div');col.className='bcol';
    col.innerHTML=`<div class="bpow ${on?'on':''}">×${p}</div>
      <button class="bbtn ${on?'on':''}" onclick="flipBit(${i})">${on?'1':'0'}</button>
      <div class="bval ${on?'on':''}">${on?p:0}</div>`;
    row.appendChild(col);
  });
  updateBinResult();
}
function flipBit(i){BB[i]=BB[i]===0?1:0;renderBits();particles(['⚡','✨'],2);}
function resetBits(){BB=[0,0,0,0];renderBits();}
function updateBinResult(){
  const val=BB[0]*8+BB[1]*4+BB[2]*2+BB[3];
  const lvl=WD.bi.levels[GS.level];
  const cur=document.getElementById('bcur'),eq=document.getElementById('beq');if(!cur)return;
  cur.textContent=val;
  if(val===lvl.target){cur.className='bsc-val match';eq.textContent='=';eq.style.color='var(--g)';setTimeout(()=>levelWin(),500);}
  else{cur.className='bsc-val nom';eq.textContent='≠';eq.style.color='var(--r)';}
}

// ═══════════════════════════════════════
// ── HARDWARE / LOGIC GATES ──
// ═══════════════════════════════════════
let HI=[0,0];
const gateCompute=(g,inp)=>g==='AND'?+(inp[0]&&inp[1]):g==='OR'?+(inp[0]||inp[1]):g==='NOT'?+(inp[0]?0:1):g==='NAND'?+(!(inp[0]&&inp[1])):g==='NOR'?+(!(inp[0]||inp[1])):g==='XOR'?+(inp[0]^inp[1]):0;
function buildHardware(){
  const lvl=WD.hw.levels[GS.level];
  HI=lvl.interactive?[0,0]:[...(lvl.inputs||[0,0])];
  const gcol={AND:'var(--g)',OR:'#FF8C00',NOT:'#FF00FF',NAND:'var(--y)',NOR:'var(--b)',XOR:'var(--pk)'}[lvl.gate]||'var(--g)';
  const gdesc={AND:{en:'Outputs 1 only when ALL inputs are 1',bn:'সব ইনপুট ১ হলেই আউটপুট ১'},OR:{en:'Outputs 1 when at least ONE input is 1',bn:'অন্তত একটি ইনপুট ১ হলে আউটপুট ১'},NOT:{en:'FLIPS the input: 1→0, 0→1',bn:'ইনপুট উল্টায়: ১→০, ০→১'},NAND:{en:'Opposite of AND: NOT(AND)',bn:'AND-এর বিপরীত: NOT(AND)'},NOR:{en:'Opposite of OR: NOT(OR)',bn:'OR-এর বিপরীত: NOT(OR)'},XOR:{en:'1 when inputs are DIFFERENT',bn:'ইনপুট আলাদা হলে ১'}};
  const b=document.getElementById('cbody');
  b.innerHTML=`<div class="gp">
    <div class="${L==='bn'?'gt-bn':'gt'}" style="color:var(--o)">⚙ ${WD.hw.name[L]}</div>
    <div class="${L==='bn'?'gs2-bn':'gs2'}">${lvl.story[L]}</div>
    <div class="tbx ${L==='bn'?'tbx-bn':''}" style="border-color:var(--o)"><strong style="color:${gcol}">${lvl.gate} GATE:</strong> ${gdesc[lvl.gate]?.[L]||''}</div>
    <div class="garena">
      <div class="${L==='bn'?'gs2-bn':'gs2'}" style="color:#aaa;font-size:${L==='bn'?'14px':'12px'}">${lvl.task[L]}</div>
      <div class="gvis" id="gvis"></div>
      ${!lvl.interactive?`<div class="gbtns">
        <div style="font-size:${L==='bn'?'14px':'11px'};color:#555;font-family:${L==='bn'?'Hind Siliguri':'Share Tech Mono'},sans-serif;margin-right:6px">${L==='en'?'What is the OUTPUT?':'আউটপুট কী?'}</div>
        <button class="gb gb-g ${L==='bn'?'gb-bn':''}" onclick="answerGate(1)">${t('out1')}</button>
        <button class="gb gb-r ${L==='bn'?'gb-bn':''}" onclick="answerGate(0)">${t('out0')}</button>
      </div>`:`<div style="background:rgba(255,107,53,.05);border:1px solid rgba(255,107,53,.18);padding:13px;font-family:${L==='bn'?'Hind Siliguri':'Share Tech Mono'},sans-serif;font-size:${L==='bn'?'14px':'12px'};color:#bbb">
        ${L==='en'?`Make output = <strong style="color:var(--o);font-size:18px">1</strong> then click CHECK`:`আউটপুট = <strong style="color:var(--o);font-size:18px">১</strong> করো তারপর CHECK ক্লিক করো`}
      </div>
      <button class="gb gb-pu ${L==='bn'?'gb-bn':''}" style="margin-top:10px" onclick="checkGateI()">${t('check')}</button>`}
    </div></div>`;
  renderGate(lvl);
}
function renderGate(lvl){
  const gv=document.getElementById('gvis');if(!gv)return;
  const out=gateCompute(lvl.gate,HI);
  const isNot=lvl.gate==='NOT';
  gv.innerHTML=`
    <div class="ginput-stack">
      ${HI.map((v,i)=>`<div class="git" onclick="toggleHI(${i})">
        <div class="gitbtn ${v?'on':'off'}">${v}</div>
        <div class="${L==='bn'?'gitlbl-bn':'gitlbl'}">${L==='en'?`INPUT ${String.fromCharCode(65+i)}`:`ইনপুট ${String.fromCharCode(65+i)}`}</div>
      </div>`).join('')}
    </div>
    <div style="font-size:26px;color:#222;display:flex;flex-direction:column;justify-content:center;gap:8px">${isNot?'→':'→\n→'}</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:7px">
      <div class="gshape g-${lvl.gate} ${out?'gag':''}">${lvl.gate}</div>
      <div style="font-size:9px;color:#333;font-family:'Press Start 2P',monospace">${t('gate')}</div>
    </div>
    <div style="font-size:26px;color:#222">→</div>
    <div class="gout">
      <div class="gbulb ${out?'on':'off'}">${out?'💡':'⚫'}</div>
      <div class="goutv ${out?'on':'off'}">${out}</div>
      <div class="${L==='bn'?'goutl-bn':'goutl'}">${t('output')}</div>
    </div>`;
}
function toggleHI(i){HI[i]=HI[i]===0?1:0;renderGate(WD.hw.levels[GS.level]);particles(['⚡'],1);}
function answerGate(guess){
  const lvl=WD.hw.levels[GS.level];const actual=gateCompute(lvl.gate,HI);
  if(guess===actual) levelWin();
  else levelFail(L==='en'?`Wrong! Output was ${actual}. Look at the glowing bulb!`:`ভুল! আউটপুট ছিল ${actual}। জ্বলন্ত বাল্বটি দেখো!`);
}
function checkGateI(){const lvl=WD.hw.levels[GS.level];const out=gateCompute(lvl.gate,HI);if(out===(lvl.target||1)) levelWin();else levelFail(L==='en'?`Output is ${out}, need ${lvl.target||1}. Keep trying!`:`আউটপুট ${out}, দরকার ${lvl.target||1}। চেষ্টা করো!`);}

// ═══════════════════════════════════════
// ── CODE DUNGEON ──
// ═══════════════════════════════════════
let CP=[];
function buildCode(){
  CP=[];
  const lvl=WD.cd.getLevels()[GS.level];const BL=lvl.blockDefs;
  const b=document.getElementById('cbody');
  b.innerHTML=`<div class="gp">
    <div class="${L==='bn'?'gt-bn':'gt'}" style="color:var(--p)">💻 ${WD.cd.name[L]}</div>
    <div class="${L==='bn'?'gs2-bn':'gs2'}">${lvl.story[L]}</div>
    <div class="tbx ${L==='bn'?'tbx-bn':''}" style="border-color:var(--p)"><strong style="color:var(--p)">${t('mission')}</strong> ${lvl.task[L]}</div>
    <div class="codearena">
      <div class="pool">
        <div class="${L==='bn'?'zonelbl-bn':'zonelbl'}">${t('toolbox')}</div>
        ${[...new Set(lvl.blocks)].map(bk=>`<div class="cblk ${BL[bk]?.cls||'cb-mv'} ${L==='bn'?'cblk-bn':''}" onclick="addBlock('${bk}')">${BL[bk]?.label?.[L]||bk}</div>`).join('')}
      </div>
      <div class="progz">
        <div class="${L==='bn'?'zonelbl-bn':'zonelbl'}">${t('progzone')}</div>
        <div id="pzone"><div class="${L==='bn'?'zph-bn':'zph'}">${t('progph')}</div></div>
      </div>
    </div>
    <div class="hstage"><canvas id="hcanv" height="86"></canvas></div>
    <div class="rstrip">
      <button class="gb gb-pu ${L==='bn'?'gb-bn':''}" onclick="runProg()">${t('run')}</button>
      <button class="gb gb-r ${L==='bn'?'gb-bn':''}" onclick="clearProg()">${t('clear')}</button>
      <div class="cout ${L==='bn'?'cout-bn':''}" id="cout">${L==='en'?'// Output here...':'// আউটপুট এখানে...'}</div>
    </div></div>`;
  const cv=document.getElementById('hcanv');if(cv){cv.width=cv.parentElement.offsetWidth-20||480;}
  drawHeroMap(lvl);
}
function addBlock(type){
  CP.push(type);
  const pz=document.getElementById('pzone');if(!pz)return;
  if(pz.querySelector('.zph,.zph-bn')) pz.innerHTML='';
  const lvl=WD.cd.getLevels()[GS.level];const BL=lvl.blockDefs;
  const idx=CP.length-1;
  const d=document.createElement('div');d.className=`cblk ${BL[type]?.cls||'cb-mv'} ${L==='bn'?'cblk-bn':''}`;
  d.innerHTML=`${BL[type]?.label?.[L]||type}<button class="cbdel" onclick="rmBlock(${idx},this.parentElement)">✕</button>`;
  pz.appendChild(d);particles(['✨'],1);
}
function rmBlock(idx,el){CP.splice(idx,1);el.remove();const pz=document.getElementById('pzone');if(pz&&!pz.children.length) pz.innerHTML=`<div class="${L==='bn'?'zph-bn':'zph'}">${t('progph')}</div>`;}
function clearProg(){CP=[];const pz=document.getElementById('pzone');if(pz) pz.innerHTML=`<div class="${L==='bn'?'zph-bn':'zph'}">${t('progph')}</div>`;const co=document.getElementById('cout');if(co){co.textContent=L==='en'?'// Cleared.':'// মুছে গেছে।';co.className='cout'+(L==='bn'?' cout-bn':'');co.style.borderColor='#222';}}
function runProg(){
  const lvl=WD.cd.getLevels()[GS.level];const goal=lvl.goal.split(',');const BL=lvl.blockDefs;const co=document.getElementById('cout');
  if(!CP.length){if(co){co.textContent=L==='en'?'> Add blocks first!':'> আগে ব্লক যোগ করো!';co.className='cout err'+(L==='bn'?' cout-bn':'');}return;}
  let log=t('running');CP.forEach((c,i)=>log+=`  ${i+1}. ${BL[c]?.label?.[L]||c}\n`);
  if(JSON.stringify(CP)===JSON.stringify(goal)){
    log+='\n'+t('reached');if(co){co.textContent=log;co.className='cout ok'+(L==='bn'?' cout-bn':'');}
    heroFlash(()=>levelWin());
  }else{
    log+='\n'+t('lost');if(co){co.textContent=log;co.className='cout err'+(L==='bn'?' cout-bn':'');}
    levelFail(L==='en'?'Wrong sequence! Check the mission and try again.':'ভুল ক্রম! মিশন দেখো এবং আবার চেষ্টা করো।');
  }
}
function drawHeroMap(lvl){
  const c=document.getElementById('hcanv');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=86,gs=lvl.grid||5,bw=Math.floor(W/gs);
  ctx.fillStyle='#040410';ctx.fillRect(0,0,W,H);
  for(let x=0;x<gs;x++){ctx.fillStyle=x%2===0?'#0d1520':'#0a1018';ctx.fillRect(x*bw,H-22,bw-1,22);ctx.fillStyle='rgba(168,85,247,.25)';ctx.fillRect(x*bw,H-22,bw-1,3);}
  if(lvl.wall){ctx.fillStyle='#333';ctx.fillRect(lvl.wall.x*bw+2,H-42,bw-4,20);ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(lvl.wall.x*bw+2,H-42,bw-4,3);}
  if(lvl.enemy){ctx.font=`${Math.min(bw-4,20)}px serif`;ctx.fillText('👾',lvl.enemy.x*bw+3,H-23);}
  ctx.font=`${Math.min(bw-4,20)}px serif`;
  ctx.fillText('💎',lvl.chest.x*bw+3,H-23);
  ctx.fillText('🧑‍💻',lvl.hero.x*bw,H-23);
}
function heroFlash(cb){const c=document.getElementById('hcanv');if(!c){cb&&cb();return;}let n=0;const id=setInterval(()=>{const ctx=c.getContext('2d');ctx.fillStyle=n%2===0?'rgba(0,255,136,.22)':'transparent';ctx.fillRect(0,0,c.width,86);n++;if(n>7){clearInterval(id);cb&&cb();}},90);}

// ── MEMORY MATCH ──
// ═══════════════════════════════════════
let MF=[],MM=new Set(),MCanFlip=true;
function buildMemory(){
  MF=[];MM=new Set();MCanFlip=true;
  const lvl=WD.nt.getLevels()[GS.level];
  const cards=[];
  lvl.pairs.forEach((p,i)=>{cards.push({id:i*2,pair:i,type:'term',c:p.term,e:p.emoji});cards.push({id:i*2+1,pair:i,type:'def',c:p.def,e:p.emoji});});
  for(let i=cards.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  const BACKS=['🌊','📡','💾','🖥️','🔌','⚙️','🌐','🔐'];
  document.getElementById('cbody').innerHTML=`<div class="gp">
    <div class="${L==='bn'?'gt-bn':'gt'}" style="color:var(--b)">🌊 ${WD.nt.name[L]}</div>
    <div class="${L==='bn'?'gs2-bn':'gs2'}">${lvl.story[L]}</div>
    <div class="memgrid">
      ${cards.map(c=>`<div class="mcard" id="mc${c.id}" data-pair="${c.pair}" data-type="${c.type}" onclick="flipCard(${c.id},this)">
        <div class="mback"><span style="font-size:26px">${BACKS[c.pair%BACKS.length]}</span></div>
        <div class="mfront">
          <div style="font-size:18px">${c.e}</div>
          <div class="${c.type==='term'?(L==='bn'?'mterm-bn':'mterm'):(L==='bn'?'mdef-bn':'mdef')}">${c.c[L]}</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="mstats"><div class="mst ${L==='bn'?'mst-bn':''}">${t('matched')} <span id="mcnt">0</span> / ${lvl.pairs.length} ${t('pairs')}</div></div>
  </div>`;
}
function flipCard(id,el){
  if(!MCanFlip||MF.includes(id)||MM.has(+el.dataset.pair))return;
  el.classList.add('flipped');MF.push(id);particles(['✨'],1);
  if(MF.length===2){
    MCanFlip=false;const[i1,i2]=MF;
    const e1=document.getElementById('mc'+i1),e2=document.getElementById('mc'+i2);
    const p1=+e1.dataset.pair,p2=+e2.dataset.pair,t1=e1.dataset.type,t2=e2.dataset.type;
    if(p1===p2&&t1!==t2){
      setTimeout(()=>{e1.classList.add('matched');e2.classList.add('matched');MM.add(p1);MF=[];MCanFlip=true;GS.score+=30;renderHUD();document.getElementById('mcnt').textContent=MM.size;particles(['⭐','🎉','✨'],5);const lvl=WD.nt.getLevels()[GS.level];if(MM.size===lvl.pairs.length) setTimeout(()=>levelWin(),550);},350);
    }else{
      setTimeout(()=>{e1.classList.add('wf');e2.classList.add('wf');setTimeout(()=>{e1.classList.remove('flipped','wf');e2.classList.remove('flipped','wf');},420);MF=[];MCanFlip=true;GS.lives=Math.max(0,GS.lives-1);renderHUD();flashSc(false);if(GS.lives<=0) setTimeout(()=>levelFail(t('tryagain')),450);},700);
    }
  }
}

// ── PIXEL ART GAME ──
// ═══════════════════════════════════════
let PXgrid=[], PXselColor=0;
function buildPixel(){
  const lvl=WD.px.levels[GS.level];
  const gs=lvl.grid||6;const pal=lvl.palette;
  PXgrid=Array.from({length:gs},()=>Array(gs).fill(-1));
  PXselColor=0;
  const b=document.getElementById('cbody');
  b.innerHTML=`<div class="gp pxgame">
    <div class="${L==='bn'?'gt-bn':'gt'}" style="color:var(--pk)">🎨 ${WD.px.name[L]} — ${lvl.name[L]}</div>
    <div class="${L==='bn'?'gs2-bn':'gs2'}">${lvl.story[L]}</div>
    <div class="tbx ${L==='bn'?'tbx-bn':''}" style="border-color:var(--pk)">
      <strong style="color:var(--pk)">💡</strong> ${L==='en'?'Select a color from the palette, then click cells to paint! Match the target pattern.':'প্যালেট থেকে রং বেছে নাও, তারপর রং করতে ঘরে ক্লিক করো! লক্ষ্য প্যাটার্ন মেলাও।'}
    </div>
    <div class="pxarea">
      <div>
        <div style="font-size:9px;color:#444;font-family:'Press Start 2P',monospace;margin-bottom:6px">${L==='en'?'YOUR CANVAS:':'তোমার ক্যানভাস:'}</div>
        <div class="pxgrid" id="pxcanv" style="grid-template-columns:repeat(${gs},1fr)">
          ${Array.from({length:gs},(_,r)=>Array.from({length:gs},(_,cl)=>`<div class="pxcell" id="pc-${r}-${cl}" style="background:#1a1a1a" onclick="paintCell(${r},${cl})"></div>`).join('')).join('')}
        </div>
      </div>
      <div class="palette" id="palette">
        <div style="font-size:8px;color:#444;font-family:'Press Start 2P',monospace;margin-bottom:5px">COLORS:</div>
        ${pal.map((c,i)=>`<div class="pcol ${i===0?'sel':''}" style="background:${c}" onclick="selectColor(${i})" id="pc${i}"></div>`).join('')}
      </div>
      <div class="pxtarget">
        <div style="font-size:9px;color:#444;font-family:'Press Start 2P',monospace;margin-bottom:6px">${L==='en'?'TARGET:':'লক্ষ্য:'}</div>
        <div class="pxtg" style="grid-template-columns:repeat(${gs},1fr)">
          ${lvl.target.flatMap(row=>row.map(ci=>`<div class="pxtc" style="width:18px;height:18px;background:${ci>=0?pal[ci]:'#1a1a1a'}"></div>`)).join('')}
        </div>
        <div class="pxlbl">${L==='en'?'Match this pattern!':'এই প্যাটার্ন মেলাও!'}</div>
      </div>
    </div>
    <div style="display:flex;gap:9px;margin-top:12px;flex-wrap:wrap">
      <button class="gb gb-cy ${L==='bn'?'gb-bn':''}" onclick="checkPixel()">${t('pxcheck')}</button>
      <button class="gb gb-r ${L==='bn'?'gb-bn':''}" onclick="clearCanvas()">${t('pxclear')}</button>
    </div>
  </div>`;
}
function selectColor(i){PXselColor=i;document.querySelectorAll('.pcol').forEach((el,idx)=>el.className='pcol'+(idx===i?' sel':''));}
function paintCell(r,c){
  const lvl=WD.px.levels[GS.level];PXgrid[r][c]=PXselColor;
  const el=document.getElementById(`pc-${r}-${c}`);
  if(el){el.style.background=lvl.palette[PXselColor];el.style.boxShadow=`0 0 5px ${lvl.palette[PXselColor]}`;}
  particles(['✨'],1);
}
function clearCanvas(){
  const lvl=WD.px.levels[GS.level];const gs=lvl.grid||6;
  PXgrid=Array.from({length:gs},()=>Array(gs).fill(-1));
  document.querySelectorAll('.pxcell').forEach(el=>{el.style.background='#1a1a1a';el.style.boxShadow='';});
}
function checkPixel(){
  const lvl=WD.px.levels[GS.level];let match=true;
  for(let r=0;r<lvl.target.length;r++) for(let c=0;c<lvl.target[r].length;c++) if(PXgrid[r][c]!==lvl.target[r][c]){match=false;break;}
  if(match) levelWin();
  else{levelFail(L==='en'?'Not quite! Some pixels are wrong. Check the target pattern.':'একদম না! কিছু পিক্সেল ভুল। লক্ষ্য প্যাটার্ন দেখো।');}
}

// ═══════════════════════════════════════
// ── SORT GAME ──
// ═══════════════════════════════════════
let SAR=[],SPTR=0,SSWAPS=0,SSORTED=[];
const SBARCOLS=['#00BFFF','#FF6B35','#A855F7','#00FF88','#FFE566','#FF69B4','#00FFEE'];
function buildSort(){
  const lvl=WD.sc.levels[GS.level];
  SAR=[...lvl.arr];SPTR=0;SSWAPS=0;SSORTED=Array(SAR.length).fill(false);
  const b=document.getElementById('cbody');
  b.innerHTML=`<div class="gp sortgame">
    <div class="${L==='bn'?'gt-bn':'gt'}" style="color:var(--cy)">🔢 ${WD.sc.name[L]}</div>
    <div class="${L==='bn'?'gs2-bn':'gs2'}">${lvl.story[L]}</div>
    <div class="tbx ${L==='bn'?'tbx-bn':''}" style="border-color:var(--cy)">${lvl.task[L]}</div>
    <div class="spass">
      <div class="${L==='bn'?'spasslbl-bn':'spasslbl'}">${L==='en'?'Comparing positions:':'তুলনা করা হচ্ছে অবস্থান:'}</div>
      <div class="scmp" id="scmp">${SPTR+1} & ${SPTR+2}</div>
      <div class="${L==='bn'?'spasslbl-bn':'spasslbl'}" style="margin-left:14px">${L==='en'?'Swaps:':'সোয়াপ:'}</div>
      <div class="scmp" id="sswap" style="color:var(--g)">0</div>
    </div>
    <div class="sortbars" id="sbars"></div>
    <div style="display:flex;gap:9px;margin-top:8px;flex-wrap:wrap">
      <button class="gb gb-cy ${L==='bn'?'gb-bn':''}" onclick="sortSwap()">${t('swapbtn')}</button>
      <button class="gb gb-gd ${L==='bn'?'gb-bn':''}" onclick="sortSkip()">${L==='en'?'✓ CORRECT ORDER (SKIP)':'✓ ক্রম সঠিক (SKIP)'}</button>
      <button class="gb gb-r ${L==='bn'?'gb-bn':''}" onclick="sortReset()">${t('reset')}</button>
    </div>
    <div class="cout ${L==='bn'?'cout-bn':''}" id="sout" style="margin-top:10px;border-color:#222">${L==='en'?'// Compare the highlighted pair — swap if left > right!':'// হাইলাইট জোড়া তুলনা করো — বাম > ডান হলে সোয়াপ করো!'}</div>
  </div>`;
  renderBars();
}
function renderBars(){
  const sb=document.getElementById('sbars');if(!sb)return;
  const maxV=Math.max(...SAR);
  sb.innerHTML=SAR.map((v,i)=>{
    const ht=Math.round((v/maxV)*110)+20;
    const col=SSORTED[i]?'var(--g)':i===SPTR||i===SPTR+1?SBARCOLS[i%SBARCOLS.length]:SBARCOLS[i%SBARCOLS.length]+'88';
    const isComp=!SSORTED[i]&&(i===SPTR||i===SPTR+1);
    return `<div class="sbar ${isComp?'comparing':''} ${SSORTED[i]?'sorted':''}">
      <div class="sbarbody" style="height:${ht}px;background:${col}22;border-color:${col}">${isComp?`<span style="font-size:10px;color:${col}">${i===SPTR?'A':'B'}</span>`:''}</div>
      <div class="sbarval" style="color:${col}">${v}</div>
    </div>`;
  }).join('');
  const sc=document.getElementById('scmp');if(sc) sc.textContent=SPTR>=SAR.length-1?'—':`${SPTR+1} & ${SPTR+2}`;
}
function sortSwap(){
  if(SPTR>=SAR.length-1) return;
  if(SAR[SPTR]>SAR[SPTR+1]){
    [SAR[SPTR],SAR[SPTR+1]]=[SAR[SPTR+1],SAR[SPTR]];SSWAPS++;
    document.getElementById('sswap').textContent=SSWAPS;
    const so=document.getElementById('sout');
    if(so){so.textContent=t('swapped');so.className='cout ok'+(L==='bn'?' cout-bn':'');}
    particles(['🔄','✨'],3);flashSc(true);
  }else{
    const so=document.getElementById('sout');
    if(so){so.textContent=t('sorted');so.style.borderColor='var(--y)';}
  }
  advanceSortPtr();
}
function sortSkip(){
  if(SPTR>=SAR.length-1) return;
  if(SAR[SPTR]>SAR[SPTR+1]){
    levelFail(L==='en'?`Wrong! ${SAR[SPTR]} > ${SAR[SPTR+1]} — they need to be SWAPPED!`:`ভুল! ${SAR[SPTR]} > ${SAR[SPTR+1]} — এগুলো SWAP করতে হবে!`);
    return;
  }
  advanceSortPtr();
}
function advanceSortPtr(){
  SPTR++;
  if(SPTR>=SAR.length-1){
    // end of pass — check sorted
    const sorted=[...SAR];sorted.sort((a,b)=>a-b);
    if(JSON.stringify(SAR)===JSON.stringify(sorted)){
      const so=document.getElementById('sout');if(so) so.textContent=t('allsorted');
      SAR.forEach((_,i)=>SSORTED[i]=true);renderBars();
      setTimeout(()=>levelWin(),700);
    }else{
      SPTR=0;// next pass
      const so=document.getElementById('sout');if(so){so.textContent=L==='en'?'Pass complete! Starting next pass...':'পাস শেষ! পরের পাস শুরু হচ্ছে...';so.style.borderColor='var(--y)';}
      renderBars();
    }
  }else renderBars();
}
function sortReset(){const lvl=WD.sc.levels[GS.level];SAR=[...lvl.arr];SPTR=0;SSWAPS=0;SSORTED=Array(SAR.length).fill(false);document.getElementById('sswap').textContent=0;const so=document.getElementById('sout');if(so){so.textContent=L==='en'?'// Reset! Try again.':'// রিসেট! আবার চেষ্টা করো।';so.className='cout'+(L==='bn'?' cout-bn':'');so.style.borderColor='#222';}renderBars();}

// ═══════════════════════════════════════
// WIN / FAIL
// ═══════════════════════════════════════
function levelWin(){
  GS.score+=100;GS.perfect+=(GS.lives===3?1:0);renderHUD();
  flashSc(true);particles(['🎉','⭐','✨','💫','🌟'],18);
  const w=WD[GS.world];
  const lvls=w.type==='code'?w.getLevels():(w.type==='memory'?w.getLevels():(w.type==='pixel'?w.levels:w.type==='sort'?w.levels:(w.levels)));
  const nl=Array.isArray(lvls)?lvls.length:(typeof lvls==='number'?lvls:5);
  if(GS.level<nl-1){
    GS.level++;
    if(GS.level===Math.floor(nl/2)) showFact(w.fact[L]);
    setTimeout(loadLevel,650);
  }else{
    GS.cw[GS.world]=GS.score;if(!GS.bs[GS.world]||GS.score>GS.bs[GS.world]) GS.bs[GS.world]=GS.score;
    const ns=GS.perfect>=nl?3:GS.perfect>=Math.ceil(nl/2)?2:1;GS.ts+=ns;saveG();
    showFact(w.fact[L]);setTimeout(()=>showComplete(nl),3200);
  }
}
function levelFail(msg){
  GS.lives=Math.max(0,GS.lives-1);renderHUD();flashSc(false);
  const co=document.getElementById('cout');if(co){co.textContent='❌ '+msg;co.className='cout err'+(L==='bn'?' cout-bn':'');}
  if(GS.lives<=0){
    setTimeout(()=>{
      if(confirm(`${L==='en'?'💀 OUT OF LIVES!\n':'💀 জীবন শেষ!\n'}${msg}\n\n${L==='en'?'Try again?':'আবার চেষ্টা করবে?'}`)){GS.lives=3;renderHUD();loadLevel();}
      else showScreen('ws');
    },400);
  }
}
function flashSc(good){const f=document.getElementById('flo');f.className='flo';void f.offsetWidth;f.className='flo '+(good?'fw':'fl');}

// FACT TOAST
let ftmr=null;
function showFact(text){
  const ft=document.getElementById('ftst'),ftt=document.getElementById('ftt'),ftb=document.getElementById('ftb');
  ftt.textContent=L==='en'?'⚡ COOL FACT UNLOCKED!':'⚡ দারুণ তথ্য আনলক হলো!';
  ftt.className=L==='bn'?'ftt ftt-bn':'ftt';ftb.textContent=text;ftb.className=L==='bn'?'ftb ftb-bn':'ftb';
  ft.classList.add('show');clearTimeout(ftmr);ftmr=setTimeout(()=>ft.classList.remove('show'),9000);
}

// COMPLETE
function showComplete(nl){
  const el=Math.round((Date.now()-GS.startTime)/1000);
  const ns=GS.perfect>=nl?3:GS.perfect>=Math.ceil(nl/2)?2:1;
  const cst=document.getElementById('csstars');cst.innerHTML='';
  for(let i=0;i<3;i++){const s=document.createElement('span');s.className='cstar';s.textContent='⭐';cst.appendChild(s);if(i<ns) setTimeout(()=>{s.classList.add('show');particles(['⭐','✨'],3);},500+i*420);}
  document.getElementById('cscsc').textContent=GS.score;document.getElementById('cscpf').textContent=`${GS.perfect}/${nl}`;document.getElementById('csctm').textContent=`${el}s`;
  document.getElementById('csfact').textContent=WD[GS.world].fact[L];document.getElementById('csfact').className=L==='bn'?'csft csft-bn':'csft';
  document.getElementById('cstt').textContent=L==='en'?'🎉 WORLD COMPLETE!':'🎉 জগৎ জয় করলে!';
  document.querySelector('.csfl').textContent=L==='en'?'💡 DID YOU KNOW?':'💡 তুমি কি জানো?';
  document.querySelectorAll('.csbtns .gb').forEach(b=>{if(b.dataset[L]) b.textContent=b.dataset[L];b.className=b.className.replace(' gb-bn','');if(L==='bn') b.className+=' gb-bn';});
  document.querySelectorAll('.cssl').forEach(el=>{if(el.dataset[L]) el.textContent=el.dataset[L];el.className=L==='bn'?'cssl cssl-bn':'cssl';});
  showScreen('cmpsc');
}
function replayWorld(){startWorld(GS.world);}
function nextWorld(){const ids=Object.keys(WD);startWorld(ids[(ids.indexOf(GS.world)+1)%ids.length]);}

// PARTICLES
function particles(em,n,cx,cy){
  cx=cx||window.innerWidth/2;cy=cy||window.innerHeight/2;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='ptcl';p.textContent=em[~~(Math.random()*em.length)];
    const px=(Math.random()-.5)*window.innerWidth*.7,py=-(Math.random()*320+80),pr=(Math.random()-.5)*700;
    p.style.cssText=`left:${cx}px;top:${cy}px;--px:${px}px;--py:${py}px;--pr:${pr}deg;animation-delay:${Math.random()*.14}s;font-size:${15+~~(Math.random()*14)}px`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),2100);
  }
}

// INIT
buildWS();buildHowTo();applyLang();updateStats();
document.addEventListener('keydown',e=>{if(e.key==='Escape') showScreen('ws');if(e.key==='l'||e.key==='L') toggleLang();});
window.addEventListener('resize',()=>{const c=document.getElementById('bgc');if(c){c.width=window.innerWidth;c.height=window.innerHeight;}if(GS.world&&document.getElementById('gs').classList.contains('active')) startScene(GS.world);});
